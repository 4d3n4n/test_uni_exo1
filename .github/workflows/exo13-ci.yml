name: CI Exo13 - API bancaire

on:
  push:
    branches: [ main, exo13 ]
    paths:
      - '03_exercices/exercice13/**'
      - '.github/workflows/exo13-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '03_exercices/exercice13/**'
      - '.github/workflows/exo13-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: 03_exercices/exercice13

jobs:
  build-and-test:
    name: Tests + rapports (exercice13)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Java 21 avec cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Vérifier Java et Maven
        run: |
          java -version
          mvn -version

      - name: Lancer les tests et générer les rapports
        run: mvn clean verify

      # Les chemins d'upload sont relatifs à la racine du dépôt (pas au working-directory).
      - name: Publier les rapports de tests (surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: 03_exercices/exercice13/target/surefire-reports/**
          if-no-files-found: warn

      - name: Publier le rapport de couverture JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: 03_exercices/exercice13/target/site/jacoco/**
          if-no-files-found: warn

      - name: Publier les rapports Cucumber BDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: 03_exercices/exercice13/target/cucumber-reports/**
          if-no-files-found: warn
