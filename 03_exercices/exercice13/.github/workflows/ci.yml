name: CI - API bancaire


on:
  push:
    branches: [ main, exo13 ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Tests + rapports
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Java 21 avec cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Vérifier Java et Maven
        run: |
          java -version
          mvn -version

      - name: Lancer les tests et générer les rapports
        run: mvn clean verify

      - name: Publier les rapports de tests (surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          if-no-files-found: warn

      - name: Publier le rapport de couverture JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/**
          if-no-files-found: warn

      - name: Publier les rapports Cucumber BDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: target/cucumber-reports/**
          if-no-files-found: warn
